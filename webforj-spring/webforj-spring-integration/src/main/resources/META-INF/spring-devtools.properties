# Spring DevTools configuration for webforJ
# Include webforJ jars in the restart classloader so application code, the framework, and the
# development tooling all hot reload together. Nothing is pinned to the base classloader: the live
# reload socket is recreated on every restart and the development jars survive a restart through JVM
# wide markers, not through classloader placement.
restart.include.webforj=/webforj-[\\w\\d-\\.]+\\.jar

---
type: specs.openrewrite.org/v1beta/recipe
name: com.webforj.rewrite.v26.UpgradeWebforj
displayName: Upgrade to webforJ 26
description: Upgrades webforJ projects to version 26.
tags:
  - webforj
recipeList:
  - org.openrewrite.maven.ChangePropertyValue:
      key: webforj.version
      newValue: ${project.version}
  - org.openrewrite.java.migrate.UpgradeJavaVersion:
      version: 21
  - com.webforj.rewrite.v26.UpgradeWebforjData
  - com.webforj.rewrite.v26.UpgradeWebforjTable
  - com.webforj.rewrite.v26.UpgradeWebforjWebswing

---
type: specs.openrewrite.org/v1beta/recipe
name: com.webforj.rewrite.v26.UpgradeWebforjData
displayName: Upgrade webforJ Data APIs to 26
description: Upgrades deprecated webforJ Data repository APIs to version 26.
tags:
  - webforj
recipeList:
  # Renames
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: com.webforj.data.repository.QueryableRepository setFilter(..)
      newMethodName: setBaseFilter
      matchOverrides: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: com.webforj.data.repository.RetrievalCriteria getFilter()
      newMethodName: getBaseFilter
      matchOverrides: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: com.webforj.data.repository.RetrievalCriteria getOrderBy()
      newMethodName: getOrderCriteriaList
      matchOverrides: true
  - org.openrewrite.java.ChangeMethodInvocationReturnType:
      methodPattern: com.webforj.data.repository.AbstractRepository getOrderCriteriaList()
      newReturnType: com.webforj.data.repository.OrderCriteriaList
  - org.openrewrite.java.ChangeMethodInvocationReturnType:
      methodPattern: com.webforj.data.repository.CollectionRepository getOrderCriteriaList()
      newReturnType: com.webforj.data.repository.OrderCriteriaList
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: com.webforj.data.repository.Repository findOneBy(..)
      newMethodName: findBy
      matchOverrides: true

  # Type migrations
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: com.webforj.data.repository.RetrievalCriteria
      newFullyQualifiedTypeName: com.webforj.data.repository.RepositoryCriteria
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: com.webforj.data.repository.RetrievalBuilder
      newFullyQualifiedTypeName: com.webforj.data.repository.RepositoryCriteria

  # Removed APIs that need manual migration
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.data.repository.RetrievalCriteria setOrderBy(..)
      matchOverrides: true
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.RetrievalCriteria setOrderBy(..)
      comment: "TODO webforJ 26: Removed. Replace with getOrderCriteriaList().add(new OrderCriteria<>(keyExtractor, direction))."
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.AbstractRepository setOrderBy(..)
      comment: "TODO webforJ 26: Removed. Replace with getOrderCriteriaList().add(new OrderCriteria<>(keyExtractor, direction))."
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.CollectionRepository setOrderBy(..)
      comment: "TODO webforJ 26: Removed. Replace with getOrderCriteriaList().add(new OrderCriteria<>(keyExtractor, direction))."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.data.repository.Repository getIndex(..)
      matchOverrides: true
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.Repository getIndex(..)
      comment: "TODO webforJ 26: Removed. Use find(key) or findBy(criteria) to look up entities."
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.AbstractRepository getIndex(..)
      comment: "TODO webforJ 26: Removed. Use find(key) or findBy(criteria) to look up entities."
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.CollectionRepository getIndex(..)
      comment: "TODO webforJ 26: Removed. Use find(key) or findBy(criteria) to look up entities."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.data.repository.Repository findByIndex(..)
      matchOverrides: true
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.Repository findByIndex(..)
      comment: "TODO webforJ 26: Removed. Use find(key) or findBy(criteria) to look up entities."
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.AbstractRepository findByIndex(..)
      comment: "TODO webforJ 26: Removed. Use find(key) or findBy(criteria) to look up entities."
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.data.repository.CollectionRepository findByIndex(..)
      comment: "TODO webforJ 26: Removed. Use find(key) or findBy(criteria) to look up entities."


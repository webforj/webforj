type: specs.openrewrite.org/v1beta/recipe
name: com.webforj.rewrite.v26.UpgradeWebforjTable
displayName: Upgrade webforJ Table APIs to 26
description: Upgrades deprecated webforJ Table APIs to version 26.
tags:
  - webforj
recipeList:
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.Table selectIndex(..)
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.Table selectIndex(..)
      comment: "TODO webforJ 26: Removed. Use select(items) or selectKey(keys) instead."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.Table deselectIndex(..)
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.Table deselectIndex(..)
      comment: "TODO webforJ 26: Removed. Use deselect(items), deselectKey(keys) or deselectAll() instead."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.Table getSelectedIndex()
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.Table getSelectedIndex()
      comment: "TODO webforJ 26: Removed. Use getSelected() or getSelectedItem() instead."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.Table getSelectedIndices()
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.Table getSelectedIndices()
      comment: "TODO webforJ 26: Removed. Use getSelectedItems() instead."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.event.selection.TableItemSelectionChange getSelectedIndex()
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.event.selection.TableItemSelectionChange getSelectedIndex()
      comment: "TODO webforJ 26: Removed. Use getSelectedItem() instead."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.event.selection.TableItemSelectionChange getSelectedIndices()
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.event.selection.TableItemSelectionChange getSelectedIndices()
      comment: "TODO webforJ 26: Removed. Use getSelectedItems() instead."
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.webforj.component.table.renderer.IconRenderer <constructor>(String, ..)
  - org.openrewrite.java.AddCommentToMethodInvocations:
      methodPattern: com.webforj.component.table.renderer.IconRenderer <constructor>(String, ..)
      comment: "TODO webforJ 26: Removed. Use new IconRenderer(new Icon(name, pool)) instead."

